name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # The DOM-helper tests boot injected.js over jsdom (the one devDependency),
      # so install it. Live tests still self-skip without OPENWEBUI_URL/KEY.
      - run: npm ci
      - run: npm test
