name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      # No dependencies — the offline suite uses only Node's built-in
      # node:test runner. Live tests self-skip without OPENWEBUI_URL/KEY.
      - run: npm test
