name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # Install devDeps (esbuild/typescript/jsdom). `npm test` runs `pretest`
      # (npm run build) first, so tests exercise the built dist/. TS type errors
      # are caught separately by `typecheck`. Live tests self-skip without keys.
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # Build the loadable extension and upload it, so users can grab a ready-to-load
  # dist/ from any run instead of building locally (the extension now needs a build).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: window-ml-extension
          path: dist/
